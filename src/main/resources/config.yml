# ───────────────────────────────────────────────
#  AchievementCheck 設定ファイル
# ───────────────────────────────────────────────

# enabled: プラグイン全体を有効にするかどうか。
#          false の間は /ac の確認機能を無効にします（/ac reload は実行可能）。
#          編集後 /ac reload で反映されます。
enabled: true

# show-completed: 詳細表示（GUI の詳細画面・/ac <実績名> のチャット）で、
#                 達成済みの条件も併せて表示するかどうか。false なら未達成のみ。
show-completed: true

# hover-missing-limit: GUI 一覧で各実績アイコンの説明（カーソルを合わせたとき）に
#                      出す「未達成の条件」の最大件数。超過分は「ほか N 件」と要約します。
hover-missing-limit: 10

# max-list: /ac <実績名> のチャット出力で、未達成・達成済みそれぞれ何件まで
#           列挙するか。超過分は「ほか N 件」と要約します。
max-list: 80

# gui-rows: GUI（チェスト）の行数。1 行 9 スロットで、最下段はページ送り等のナビに使います。
#           2〜6 の範囲で指定してください（既定 6）。
gui-rows: 6
